---
layout: index
index_name: 分类
title: 分类
---

<div class="col-layout-container">
    <div class="col-layout-sidebar" id="navibar">
    </div>
    <div class="col-layout-content" id="listcontent">
        内容加载中
    </div>
</div>

<script src="{{ '/assets/js/postdata.js' | asset_digest | relative_url }}"></script>

<script>
    const categoryNs = window.categoryNs || {};

    categoryNs.naviContainerId = "navibar";
    categoryNs.contentContainerId = "listcontent";
    categoryNs.contentPageSize = {{ site.paginate }};

    // Build category -> posts index
    const CatePostData = (() => {
        const cate2posts = {};

        for (const post of postdataNs.posts) {
            for (const category of post.categories) {
                if (!cate2posts[category]) {
                    cate2posts[category] = [];
                }
                cate2posts[category].push(post);
            }
        }

        return { get: () => cate2posts };
    })();

    // URI handling
    const URICtrl = {
        anchorStr: "###",

        genURIComponent(category, page = 1) {
            return `${this.anchorStr}category=${category}&page=${page}`;
        },

        parseURI(href = window.location.href) {
            const ret = { category: "_PLACEHOLDER_", page: "1" };
            const matchQuery = href.match(/.*###(.*)/);
            if (!matchQuery) return ret;

            for (const s of matchQuery[1].split('&').filter(s => s)) {
                try {
                    const trimmed = s.replace(/^[/\s\uFEFF\xA0]+|[/\s\uFEFF\xA0]+$/g, '');
                    const kv = decodeURIComponent(trimmed).split('=');
                    if (kv.length === 2) {
                        ret[kv[0]] = kv[1];
                    }
                } catch (e) {
                    console.log("decodeURIComponent failed; err=%s, s=%s", e, s);
                }
            }
            return ret;
        },

        genURI(category, page = 1) {
            const component = this.genURIComponent(category, page);
            const href = window.location.href;
            const pos = href.indexOf(this.anchorStr);
            return (pos !== -1 ? href.substring(0, pos) : href) + component;
        }
    };

    // DOM rendering
    const DOMDraw = (() => {
        function buildNaviListDOM(category2posts) {
            const panel = document.createElement('div');
            panel.id = 'category_panel';
            panel.className = 'panel';

            const navi = document.createElement('ul');
            navi.className = 'list-group';

            const cateName2DOM = {};
            const cateInDrawOrder = [];

            const sortedCategories = Object.entries(category2posts)
                .sort((a, b) => b[1].length - a[1].length);

            for (const [category, posts] of sortedCategories) {
                cateInDrawOrder.push(category);

                const link = document.createElement('a');
                link.className = 'list-group-item';
                link.href = URICtrl.genURIComponent(category);
                link.dataset.category = category;
                link.innerHTML = `${category}<span class="badge">${posts.length}</span>`;

                cateName2DOM[category] = link;
                navi.appendChild(link);
            }

            panel.appendChild(navi);
            return { panel, cateName2DOM, cateInDrawOrder };
        }

        return class DOMDraw {
            constructor({ cate2posts }) {
                this.cate2posts_ = cate2posts;
                this.naviContainerDOM_ = document.getElementById(categoryNs.naviContainerId);
                this.contentContainerDOM_ = document.getElementById(categoryNs.contentContainerId);

                const { panel, cateName2DOM, cateInDrawOrder } = buildNaviListDOM(cate2posts);
                this.cateName2DOM_ = cateName2DOM;
                this.cateInDrawOrder = cateInDrawOrder;
                this.naviContainerDOM_.appendChild(panel);
            }

            activeNaviSelectedCategory(selectCategory) {
                const selectDOM = this.cateName2DOM_[selectCategory];
                if (!selectDOM) return;

                Object.values(this.cateName2DOM_).forEach(el => el.classList.remove('active'));
                selectDOM.classList.add('active');
            }

            updateContent(category, page) {
                const posts = this.cate2posts_[category];
                if (!posts) {
                    console.log("category [%s] doesn't have posts", category);
                    return;
                }

                const pageSz = categoryNs.contentPageSize;
                const pageNum = Math.ceil(posts.length / pageSz);
                if (typeof page === "string") page = parseInt(page);
                if (isNaN(page) || page < 1 || page > pageNum) {
                    console.log("invalid page [%s], should in range [%s, %s]", page, 1, pageNum);
                    return;
                }

                const container = this.contentContainerDOM_;
                container.innerHTML = '';

                // Post list
                const ulDOM = document.createElement('ul');
                ulDOM.className = 'post-list';
                const showPosts = posts.slice((page - 1) * pageSz, page * pageSz);
                for (const post of showPosts) {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <h3><a class="post-link" href="${post.url}">${post.title}</a></h3>
                        <p class="post-excerpt"><em>${post.date}</em> ${post.excerpt}</p>
                    `;
                    ulDOM.appendChild(li);
                }
                container.appendChild(ulDOM);

                // Pagination
                container.appendChild(this._buildPaginationDOM(category, page, pageNum));
            }

            _buildPaginationDOM(category, page, pageNum) {
                const wrapper = document.createElement('div');
                wrapper.className = 'pagination';

                const createIndicator = (cls, texts, hrefs) => {
                    const div = document.createElement('span');
                    div.className = cls;
                    for (let i = 0; i < texts.length; i++) {
                        if (hrefs[i]) {
                            const a = document.createElement('a');
                            a.href = hrefs[i];
                            a.textContent = texts[i];
                            div.appendChild(a);
                        } else {
                            div.appendChild(document.createTextNode(texts[i]));
                        }
                        if (i < texts.length - 1) div.appendChild(document.createTextNode(' '));
                    }
                    return div;
                };

                const preHref = page > 1 ? URICtrl.genURIComponent(category, page - 1) : null;
                const nextHref = page < pageNum ? URICtrl.genURIComponent(category, page + 1) : null;

                wrapper.appendChild(createIndicator('pre', [preHref ? '上一页' : ''], [preHref]));

                const numTexts = [], numHrefs = [];
                for (let i = 1; i <= pageNum; i++) {
                    numTexts.push(i);
                    numHrefs.push(i !== page ? URICtrl.genURIComponent(category, i) : null);
                }
                wrapper.appendChild(createIndicator('num', numTexts, numHrefs));

                wrapper.appendChild(createIndicator('nxt', [nextHref ? '下一页': ''], [nextHref]));

                return wrapper;
            }

            draw(category, page = 1) {
                this._scrollToTop();
                this.activeNaviSelectedCategory(category);
                this.updateContent(category, page);
                window.location.href = URICtrl.genURI(category, page);
            }

            _scrollToTop() {
                const scroll = () => {
                    const pos = window.pageYOffset;
                    if (pos > 0) {
                        window.scrollTo(0, pos > 160 ? pos / 1.2 : pos - 20);
                    } else {
                        clearInterval(st);
                    }
                };
                const st = setInterval(scroll, 16);
            }
        };
    })();

    // Event binding
    const EventBinder = class EventBinder {
        constructor(drawer) {
            this.drawer = drawer;
        }

        bindNaviClick() {
            document.getElementById(categoryNs.naviContainerId).addEventListener('click', (e) => {
                if (e.target.tagName !== 'A') return;
                e.preventDefault();
                this.drawer.draw(e.target.dataset.category);
            });
        }

        bindPaginationClick() {
            document.getElementById(categoryNs.contentContainerId).addEventListener('click', (e) => {
                if (e.target.tagName !== 'A') return;
                const parent = e.target.parentNode;
                if (!parent || !['pre', 'num', 'nxt'].includes(parent.className)) return;

                const { category, page } = URICtrl.parseURI(e.target.href);
                this.drawer.draw(category, page);
                return false;
            });
        }

        actInstant() {
            const { category: urlCategory, page: urlPage } = URICtrl.parseURI();
            let category = urlCategory;
            if (!this.drawer.cate2posts_[category]) {
                category = this.drawer.cateInDrawOrder[0];
            }
            if (!category) return;

            let page = urlPage ? parseInt(urlPage) : 1;
            const postsLen = this.drawer.cate2posts_[category].length;
            if (isNaN(page) || page < 1 || (page - 1) * categoryNs.contentPageSize > postsLen) {
                page = 1;
            }
            this.drawer.draw(category, page);
        }

        bindAndAct() {
            this.bindNaviClick();
            this.bindPaginationClick();
            this.actInstant();
        }
    };

    // Initialize
    const drawer = new DOMDraw({ cate2posts: CatePostData.get() });
    new EventBinder(drawer).bindAndAct();
</script>
