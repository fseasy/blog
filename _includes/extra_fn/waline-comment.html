<!-- Waline comments -->
<style>

:root {
  --waline-theme-color: var(--btn-primary-bg);
  --waline-active-color: var(--btn-primary-hover);
}

#waline-thread {
  margin: 30px 0;
}

</style>

<div id="waline-thread"></div>
<div class="text-center" id="comment-btn-wrapper">
  <button type="button" class="btn-ghost" id="comment-btn">点击评论</button>
  <div class="loading-dots hidden">
    <span></span><span></span><span></span>
  </div>
  <button type="button" id="close-comment-btn" class="btn-ghost hidden">关闭评论</button>
</div>

<script>
  (() => {
    const WALINE_CSS = 'https://unpkg.com/@waline/client@v3/dist/waline.css';
    const WALINE_META_CSS = 'https://unpkg.com/@waline/client@v3/dist/waline-meta.css';
    const WALINE_JS = 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    const WALINE_SERVER_URL = '{{ site.waline.serverURL }}';

    // Set pageview path dynamically
    const pagePath = window.location.pathname;
    document.querySelector('.waline-pageview-count').dataset.path = pagePath;

    const btn = document.getElementById("comment-btn");
    const loadingDots = document.querySelector(".loading-dots");
    const closeBtn = document.getElementById("close-comment-btn");
    const thread = document.getElementById("waline-thread");
    let walineLoaded = false;

    btn.addEventListener("click", () => {
      if (walineLoaded) {
        thread.style.display = '';
        btn.classList.add("hidden");
        closeBtn.classList.remove("hidden");
        return;
      }

      btn.classList.add("hidden");
      loadingDots.classList.remove("hidden");

      // Load Waline CSS (idempotent, safe to re-append)
      for (const linkUrl of [WALINE_CSS, WALINE_META_CSS]) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = linkUrl;
        document.head.appendChild(link);
      }

      // Load and init Waline JS via dynamic import
      import(WALINE_JS).then(({ init }) => {
        init({
          el: '#waline-thread',
          serverURL: WALINE_SERVER_URL,
          dark: 'auto'
        });
        walineLoaded = true;
        loadingDots.classList.add("hidden");
        closeBtn.classList.remove("hidden");
      });
    });

    closeBtn.addEventListener("click", () => {
      thread.style.display = 'none';
      closeBtn.classList.add("hidden");
      btn.classList.remove("hidden");
    });
  })();
</script>
